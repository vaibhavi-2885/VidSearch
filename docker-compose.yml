services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vidsearch-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7
    container_name: vidsearch-redis
    ports:
      - "6379:6379"

volumes:
  qdrant_storage:
